<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Oak Configurator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <h3>Royal Oak Configurator</h3>
            <p>Swipe the watch or use selectors below</p>
        </header>
        
        <div class="main-layout">
            <div class="watch-viewport" id="viewport">
                <div class="swipe-track" id="strap-track"></div>
                <div class="swipe-track" id="face-track"></div>
                
                <div class="touch-zone" id="face-zone"></div>
                <div class="touch-zone" id="strap-zone"></div>
            </div>

            <div class="selection-panel">
                <section>
                    <h3>Face Color</h3>
                    <div class="color-selector" id="face-selector">
                        <button class="nav-btn" onclick="changeColor('face', -1)">&#10094;</button>
                        <div class="current-info">
                            <div class="swatch-preview" id="face-preview"></div>
                            <span class="color-name" id="face-name">Black</span>
                        </div>
                        <button class="nav-btn" onclick="changeColor('face', 1)">&#10095;</button>
                    </div>
                </section>
                <section>
                    <h3>Strap Color</h3>
                    <div class="color-selector" id="strap-selector">
                        <button class="nav-btn" onclick="changeColor('strap', -1)">&#10094;</button>
                        <div class="current-info">
                            <div class="swatch-preview" id="strap-preview"></div>
                            <span class="color-name" id="strap-name">Black</span>
                        </div>
                        <button class="nav-btn" onclick="changeColor('strap', 1)">&#10095;</button>
                    </div>
                </section>
                <button id="download-btn" class="download-button" onclick="downloadWatch()">Download Combination</button>                
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
